# IBeam — keeps the IBKR Client Portal Gateway authenticated and alive so the
# Directional leg can trade without you re-logging-in by hand each day.
#
# It REPLACES the manual `bin\run.bat root\conf.yaml` gateway: IBeam runs its own
# gateway on localhost:5000, logs in with your credentials from env.list, and
# re-authenticates / tickles the session automatically.
#
# Setup:
#   1. Install Docker Desktop (https://www.docker.com/products/docker-desktop/).
#   2. cp env.list.example env.list   (then put your IBKR creds in env.list)
#   3. Stop the manual gateway window if it's running (frees port 5000).
#   4. docker compose up -d
#   5. Confirm: open https://localhost:5000  (or run `boardroom preflight`).
#
# Boardroom needs no change: IBKR_GATEWAY_URL stays https://localhost:5000.

services:
  ibeam:
    image: voyz/ibeam:latest
    container_name: ibeam
    env_file: env.list
    ports:
      - "5000:5000"
    restart: unless-stopped
